<!doctype html>
<html lang="zh-Hant">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>氣泡排序 Bubble Sort — 視覺化步驟示範</title>
	<style>
		:root{
			--bg:#0f1724;--panel:#0b1220;--muted:#9aa7c0;--accent:#4ac1ff;--accent-2:#ffa94d;
			--ok:#2bd39b;--danger:#ff6b6b;--card:#0b1220
		}
		*{box-sizing:border-box}
		body{margin:0;font-family:Inter,Segoe UI,Arial;background:linear-gradient(180deg,var(--bg),#07101a);color:#e6eef8;padding:28px}
		.wrap{max-width:980px;margin:0 auto}
		h1{display:flex;align-items:center;gap:10px;font-weight:600}
		.meta{color:var(--muted);margin-top:6px}

		.panel{background:var(--panel);border-radius:12px;padding:18px;margin-top:16px;box-shadow:0 6px 18px rgba(2,6,23,.6)}
		.desc{background:#071428;padding:12px;border-radius:8px;color:var(--muted)}

		.stats{display:flex;gap:10px;margin:12px 0;align-items:center}
		.stat{padding:8px 12px;border-radius:8px;background:rgba(255,255,255,.03);font-size:13px}
		.controls{display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap}
		input[type=text]{padding:8px;border-radius:8px;border:none;background:#071428;color:inherit;min-width:260px}
		button{background:linear-gradient(180deg,var(--accent),#2aa8e6);border:none;color:#04212b;padding:10px 14px;border-radius:999px;cursor:pointer}
		button.ghost{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,.04)}
		button.warn{background:linear-gradient(180deg,var(--accent-2),#ff9244);color:#05120b}
		.small{padding:8px 10px;font-size:13px}
		#visualWrap{height:320px;margin-top:14px;display:flex;align-items:center;justify-content:center}
		#visual{width:100%;height:100%;display:flex;align-items:flex-end;gap:10px;padding:18px;border-radius:10px;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent)}
		.bar{flex:1;display:flex;align-items:flex-end;justify-content:center;background:linear-gradient(180deg,#2b8fd9,#1b6aa8);color:#fff;border-radius:6px 6px 4px 4px;padding:6px 4px;font-weight:600}
		.bar.compare{background:linear-gradient(180deg,#ffa94d,#ff7a00)}
		.bar.swap{background:linear-gradient(180deg,#ff6b6b,#ff3956)}
		.bar.sorted{background:linear-gradient(180deg,#2bd39b,#18a172)}
		.legend{display:flex;gap:12px;align-items:center;margin-top:10px;color:var(--muted)}
		.legend .item{display:flex;gap:8px;align-items:center}
		.dot{width:14px;height:14px;border-radius:4px}
		.dot.un{background:#2b8fd9}
		.dot.cmp{background:#ffa94d}
		.dot.swap{background:#ff6b6b}
		.dot.done{background:#2bd39b}

		.footerControls{display:flex;gap:8px;align-items:center;margin-top:14px}
		.status{margin-left:auto;color:var(--muted)}
		.controls input[type=range]{width:160px}

		.badge{background:rgba(255,255,255,.03);padding:6px 10px;border-radius:999px;color:var(--muted);font-size:13px}
	</style>
</head>
<body>
	<div class="wrap">
		<h1>📚 排序演示 - 選擇一個演算法</h1>
		<div class="meta">請選擇要查看的排序演算法</div>

		<div class="panel" style="display:flex;flex-direction:column;gap:12px;align-items:center;justify-content:center;padding:40px">
			<a href="bubble_sort.html" class="badge" style="padding:14px 20px;font-size:16px;display:inline-block">⚪ 氣泡排序 Bubble Sort</a>
			<a href="selection_sort.html" class="badge" style="padding:14px 20px;font-size:16px;display:inline-block">🔷 選擇排序 Selection Sort</a>
		</div>
	</div>

</body>
</html>
